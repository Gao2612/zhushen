<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>诸神终应知晓</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body {
      font-family: "Microsoft YaHei UI", "PingFang SC", sans-serif;
      color: #f7ead4;
      background: #06070b;
    }
    .bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: .56;
      filter: saturate(.88) contrast(1.08);
    }
    .shade {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(4,5,8,.92), rgba(4,5,8,.62) 46%, rgba(4,5,8,.18)),
        linear-gradient(0deg, rgba(4,5,8,.96), rgba(4,5,8,.42) 48%, rgba(4,5,8,.7));
    }
    main {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(420px, 1fr) 420px;
      height: 100vh;
      padding: 52px;
      gap: 40px;
    }
    .hero {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-width: 0;
      padding-bottom: 18px;
    }
    .eyebrow {
      margin: 0 0 14px;
      color: #f0d78c;
      font-size: 13px;
      letter-spacing: .28em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      color: #fff7e8;
      font-size: clamp(60px, 8vw, 108px);
      line-height: .96;
      letter-spacing: .04em;
      text-shadow: 0 16px 48px rgba(0,0,0,.78);
    }
    .subtitle {
      max-width: 560px;
      margin: 20px 0 0;
      color: rgba(247,234,212,.76);
      font-size: 15px;
      line-height: 1.9;
    }
    .meta {
      display: none;
      gap: 10px;
      margin-top: 28px;
      flex-wrap: wrap;
    }
    .meta span {
      padding: 8px 12px;
      border: 1px solid rgba(240,215,140,.18);
      border-radius: 999px;
      color: rgba(247,234,212,.72);
      background: rgba(6,7,11,.46);
      backdrop-filter: blur(12px);
      font-size: 12px;
    }
    .panel {
      align-self: end;
      display: grid;
      gap: 18px;
      padding: 26px;
      border: 1px solid rgba(240,215,140,.22);
      border-radius: 22px;
      background: rgba(9,10,15,.86);
      box-shadow: 0 28px 92px rgba(0,0,0,.52);
      backdrop-filter: blur(22px);
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .panel h2 {
      margin: 0;
      color: #f0d78c;
      font-size: 20px;
      letter-spacing: .04em;
    }
    .state {
      min-width: 74px;
      padding: 7px 10px;
      border-radius: 999px;
      text-align: center;
      color: #101014;
      background: #f0d78c;
      font-size: 12px;
      font-weight: 800;
    }
    .path-box {
      display: grid;
      gap: 8px;
    }
    .path-box label {
      color: rgba(247,234,212,.58);
      font-size: 12px;
    }
    .path-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }
    .install-path {
      min-width: 0;
      padding: 13px 14px;
      border: 1px solid rgba(240,215,140,.15);
      border-radius: 12px;
      color: rgba(247,234,212,.76);
      background: rgba(255,255,255,.045);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    button {
      min-height: 44px;
      border: 1px solid rgba(240,215,140,.26);
      border-radius: 12px;
      color: #f0d78c;
      background: rgba(240,215,140,.08);
      font: inherit;
      cursor: pointer;
    }
    button:hover {
      border-color: rgba(240,215,140,.54);
      background: rgba(240,215,140,.14);
    }
    button:disabled {
      opacity: .48;
      cursor: default;
    }
    .primary {
      min-height: 58px;
      width: 100%;
      color: #100b04;
      border: 0;
      background: linear-gradient(135deg, #d4a754, #f0d78c);
      font-weight: 900;
      letter-spacing: .08em;
      box-shadow: 0 18px 48px rgba(212,167,84,.24);
    }
    .primary-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }
    .settings-menu {
      position: relative;
    }
    .gear {
      width: 58px;
      min-height: 58px;
      border-radius: 50%;
      font-size: 24px;
      line-height: 1;
    }
    .manage-panel {
      position: absolute;
      right: 0;
      bottom: calc(100% + 10px);
      z-index: 4;
      display: grid;
      min-width: 150px;
      gap: 8px;
      padding: 10px;
      border: 1px solid rgba(240,215,140,.22);
      border-radius: 14px;
      background: rgba(9,10,15,.96);
      box-shadow: 0 18px 48px rgba(0,0,0,.42);
      backdrop-filter: blur(18px);
    }
    .manage-panel[hidden] {
      display: none;
    }
    .danger {
      color: #f2aaa1;
      border-color: rgba(166,60,50,.5);
      background: rgba(166,60,50,.14);
    }
    .progress {
      display: grid;
      gap: 10px;
    }
    .track {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
    }
    .bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #9f7a22, #f0d78c);
      transition: width .25s ease;
    }
    .status {
      min-height: 42px;
      color: rgba(247,234,212,.62);
      font-size: 13px;
      line-height: 1.7;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <video
    class="bg"
    src="../manual-build/assets/official-posts/492288870839223557/pv.mp4"
    autoplay
    muted
    loop
    playsinline></video>
  <div class="shade"></div>
  <main>
    <section class="hero">
      <p class="eyebrow">Archive Installer</p>
      <h1>诸神终应知晓</h1>
      <p class="subtitle">
        玩家自制史记档案馆安装器。安装完成后可从桌面或开始菜单进入离线档案，
        所有安装、启动与卸载操作均由本安装器直接管理。
      </p>
      <div class="meta">
        <span>离线资料馆</span>
        <span>官方物料整理</span>
        <span>桌面客户端</span>
      </div>
    </section>
    <section class="panel">
      <div class="panel-head">
        <h2>游戏安装</h2>
        <div class="state" id="state">读取中</div>
      </div>
      <div class="path-box">
        <label>安装位置</label>
        <div class="path-row">
          <div class="install-path" id="installPath">正在读取...</div>
          <button id="choose">更改</button>
        </div>
      </div>
      <div class="progress">
        <div class="track"><div class="bar" id="bar"></div></div>
        <div class="status" id="status">正在读取状态...</div>
      </div>
      <div class="primary-row">
        <button class="primary" id="install">安装</button>
        <div class="settings-menu">
          <button class="gear" id="manage" title="&#31649;&#29702;" aria-label="&#31649;&#29702;">&#9881;</button>
          <div class="manage-panel" id="managePanel" hidden>
            <button id="open">&#30446;&#24405;</button>
            <button class="danger" id="uninstall">&#21368;&#36733;</button>
          </div>
        </div>
      </div>
    </section>
  </main>
  <script>
    const stateNode = document.getElementById('state');
    const pathNode = document.getElementById('installPath');
    const statusNode = document.getElementById('status');
    const barNode = document.getElementById('bar');
    const installButton = document.getElementById('install');
    const manageButton = document.getElementById('manage');
    const managePanel = document.getElementById('managePanel');
    const openButton = document.getElementById('open');
    const uninstallButton = document.getElementById('uninstall');
    const chooseButton = document.getElementById('choose');

    let installed = false;
    let busy = false;

    const setStatus = (text) => { statusNode.textContent = text; };
    const setProgress = (percent) => {
      barNode.style.width = Math.max(0, Math.min(100, Number(percent) || 0)) + '%';
    };
    const setManageOpen = (open) => {
      managePanel.hidden = !open;
    };
    const setBusy = (value) => {
      busy = value;
      installButton.disabled = value;
      chooseButton.disabled = value || installed;
      manageButton.disabled = value || !installed;
      uninstallButton.disabled = value || !installed;
      openButton.disabled = value || !installed;
      if (value || !installed) {
        setManageOpen(false);
      }
    };
    const syncButtons = () => {
      stateNode.textContent = installed ? '\u5df2\u5b89\u88c5' : '\u672a\u5b89\u88c5';
      installButton.textContent = installed ? '\u542f\u52a8' : '\u7acb\u5373\u5b89\u88c5';
      setBusy(false);
    };

    async function refresh() {
      const status = await window.ZhushenInstaller.getStatus();
      installed = status.installed;
      pathNode.textContent = status.installDir;
      setProgress(installed ? 100 : 0);
      setStatus(installed
        ? '\u5ba2\u6237\u7aef\u5df2\u5c31\u7eea\uff0c\u53ef\u4ee5\u76f4\u63a5\u542f\u52a8\u3002\u76ee\u5f55\u4e0e\u5378\u8f7d\u64cd\u4f5c\u5df2\u653e\u5165\u53f3\u4fa7\u9f7f\u8f6e\u3002'
        : status.payloadExists
          ? '\u51c6\u5907\u5c31\u7eea\uff0c\u70b9\u51fb\u7acb\u5373\u5b89\u88c5\u3002'
          : '\u672a\u627e\u5230\u5185\u7f6e\u5ba2\u6237\u7aef\u8d44\u6e90\uff0c\u8bf7\u91cd\u65b0\u6784\u5efa\u5b89\u88c5\u5668\u3002');
      syncButtons();
    }

    window.ZhushenInstaller.onProgress((payload) => {
      setProgress(payload.percent);
      setStatus(payload.message);
    });

    chooseButton.addEventListener('click', async () => {
      const installDir = await window.ZhushenInstaller.chooseInstallDir();
      pathNode.textContent = installDir;
      setStatus('\u5b89\u88c5\u4f4d\u7f6e\u5df2\u66f4\u65b0\u3002');
    });

    installButton.addEventListener('click', async () => {
      if (installed) {
        const ok = await window.ZhushenInstaller.launch();
        setStatus(ok ? '\u5ba2\u6237\u7aef\u5df2\u542f\u52a8\u3002' : '\u672a\u627e\u5230\u53ef\u542f\u52a8\u7684\u5ba2\u6237\u7aef\u3002');
        return;
      }
      setBusy(true);
      setProgress(0);
      setStatus('\u6b63\u5728\u5f00\u59cb\u5b89\u88c5...');
      const ok = await window.ZhushenInstaller.install();
      installed = ok;
      await refresh();
    });

    manageButton.addEventListener('click', () => {
      if (!installed || busy) {
        return;
      }
      setManageOpen(managePanel.hidden);
    });

    document.addEventListener('click', (event) => {
      if (!event.target.closest('.settings-menu')) {
        setManageOpen(false);
      }
    });

    uninstallButton.addEventListener('click', async () => {
      setManageOpen(false);
      setBusy(true);
      setStatus('\u6b63\u5728\u5378\u8f7d...');
      const ok = await window.ZhushenInstaller.uninstall();
      installed = !ok;
      await refresh();
    });

    openButton.addEventListener('click', async () => {
      setManageOpen(false);
      const opened = await window.ZhushenInstaller.openInstallDir();
      setStatus(opened ? '\u5df2\u6253\u5f00\u5b89\u88c5\u76ee\u5f55\u3002' : '\u5c1a\u672a\u627e\u5230\u5b89\u88c5\u76ee\u5f55\u3002');
    });

    refresh();
  </script>
</body>
</html>
