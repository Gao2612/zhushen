<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>诸神终应知晓 安装卸载器</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body {
      font-family: "Microsoft YaHei UI", "PingFang SC", sans-serif;
      color: #f6eddc;
      background: #07070b;
    }
    .bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: .5;
      filter: saturate(.86) contrast(1.08);
    }
    .shade {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 18% 16%, rgba(240, 215, 140, .25), transparent 26%),
        linear-gradient(90deg, rgba(7,7,11,.96), rgba(7,7,11,.72) 46%, rgba(7,7,11,.34)),
        linear-gradient(0deg, rgba(7,7,11,.94), transparent 48%);
    }
    main {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(360px, 560px) 1fr;
      min-height: 100vh;
      gap: 44px;
      padding: 64px;
    }
    .brand {
      align-self: center;
      display: grid;
      gap: 22px;
    }
    .eyebrow {
      margin: 0;
      color: #d4a754;
      letter-spacing: .32em;
      text-transform: uppercase;
      font-size: 13px;
    }
    h1 {
      margin: 0;
      color: #fff7e8;
      font-size: clamp(48px, 7vw, 88px);
      line-height: 1;
      letter-spacing: .04em;
      text-shadow: 0 14px 48px rgba(0,0,0,.72);
    }
    .desc {
      max-width: 500px;
      margin: 0;
      color: rgba(246, 237, 220, .72);
      line-height: 1.9;
      font-size: 15px;
    }
    .panel {
      align-self: end;
      justify-self: end;
      width: min(440px, 100%);
      padding: 28px;
      border: 1px solid rgba(212, 167, 84, .28);
      border-radius: 30px;
      background: rgba(10, 10, 16, .78);
      box-shadow: 0 24px 90px rgba(0,0,0,.48);
      backdrop-filter: blur(18px);
    }
    .panel h2 { margin: 0 0 10px; color: #f0d78c; }
    .panel p {
      margin: 0 0 20px;
      color: rgba(246,237,220,.65);
      line-height: 1.7;
    }
    .actions { display: grid; gap: 12px; }
    button {
      min-height: 54px;
      border: 1px solid rgba(212, 167, 84, .28);
      border-radius: 16px;
      color: #f0d78c;
      background: rgba(212, 167, 84, .08);
      font: inherit;
      cursor: pointer;
    }
    button:hover {
      border-color: rgba(240, 215, 140, .52);
      background: rgba(212, 167, 84, .14);
    }
    button.primary {
      color: #100b04;
      background: linear-gradient(135deg, #d4a754, #f0d78c);
      font-weight: 800;
    }
    button.danger {
      color: #f3b7ae;
      border-color: rgba(139, 46, 40, .58);
      background: rgba(139, 46, 40, .18);
    }
    .status {
      margin-top: 18px;
      color: rgba(246,237,220,.58);
      font-size: 13px;
      line-height: 1.7;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <video
    class="bg"
    src="../manual-build/assets/official-posts/492288870839223557/pv.mp4"
    autoplay
    muted
    loop
    playsinline></video>
  <div class="shade"></div>
  <main>
    <section class="brand">
      <p class="eyebrow">Abyss Knights Archive</p>
      <h1>诸神终应知晓<br>安装卸载器</h1>
      <p class="desc">
        这是独立的桌面安装 / 卸载外壳。它负责展示档案馆入口，
        并调用实际安装器或卸载器完成系统级安装流程。
      </p>
    </section>
    <section class="panel">
      <h2>汇流地档案馆</h2>
      <p>安装桌面客户端，或封存已经安装的本地档案馆。</p>
      <div class="actions">
        <button class="primary" id="install">安装桌面客户端</button>
        <button id="open">打开安装目录</button>
        <button class="danger" id="uninstall">卸载桌面客户端</button>
      </div>
      <div class="status" id="status">正在读取状态...</div>
    </section>
  </main>
  <script>
    const statusNode = document.getElementById('status');
    const setStatus = (text) => { statusNode.textContent = text; };

    async function refresh() {
      const status = await window.ZhushenInstaller.getStatus();
      setStatus(status.installed
        ? '已安装：' + status.installDir
        : '尚未安装桌面客户端。');
    }

    document.getElementById('install').addEventListener('click', async () => {
      const started = await window.ZhushenInstaller.install();
      setStatus(started
        ? '安装器已启动，请按安装器提示继续。'
        : '未找到实际安装包。');
    });

    document.getElementById('uninstall').addEventListener('click', async () => {
      const started = await window.ZhushenInstaller.uninstall();
      setStatus(started
        ? '卸载器已启动，请按卸载器提示继续。'
        : '未找到卸载器。');
    });

    document.getElementById('open').addEventListener('click', async () => {
      const opened = await window.ZhushenInstaller.openInstallDir();
      setStatus(opened ? '已打开安装目录。' : '尚未找到安装目录。');
    });

    refresh();
  </script>
</body>
</html>
