<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>诸神终应知晓</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body {
      font-family: "Microsoft YaHei UI", "PingFang SC", sans-serif;
      color: #f7ead4;
      background: #06070b;
    }
    .bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: .74;
      filter: saturate(1.05) contrast(1.12);
    }
    .poster {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: .72;
      filter: saturate(1.05) contrast(1.08);
    }
    .shade {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(4,5,8,.9), rgba(4,5,8,.46) 42%, rgba(4,5,8,.12) 70%, rgba(4,5,8,.86)),
        linear-gradient(0deg, rgba(4,5,8,.98), rgba(4,5,8,.34) 46%, rgba(4,5,8,.56));
    }
    .drag-region {
      position: fixed;
      top: 0;
      left: 0;
      right: 96px;
      height: 42px;
      z-index: 10;
      -webkit-app-region: drag;
    }
    .window-controls {
      position: fixed;
      top: 14px;
      right: 18px;
      z-index: 12;
      display: flex;
      gap: 10px;
      -webkit-app-region: no-drag;
    }
    .window-controls button {
      width: 28px;
      min-height: 28px;
      border: 1px solid rgba(247,234,212,.2);
      border-radius: 50%;
      color: rgba(247,234,212,.68);
      background: rgba(6,7,11,.36);
      line-height: 1;
    }
    .window-controls button:hover {
      color: #100b04;
      background: #f0d78c;
    }
    main {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(440px, 1fr) 392px;
      height: 100vh;
      padding: 44px 56px 78px 64px;
      gap: 32px;
    }
    .hero {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-width: 0;
      padding-bottom: 6px;
    }
    .eyebrow {
      margin: 0 0 14px;
      color: #f0d78c;
      font-size: 13px;
      letter-spacing: .28em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      color: #fff7e8;
      font-size: clamp(60px, 8vw, 108px);
      line-height: .96;
      letter-spacing: .04em;
      text-shadow: 0 16px 48px rgba(0,0,0,.78);
    }
    .title-mark {
      display: block;
      width: min(520px, 40vw);
      max-height: 108px;
      height: auto;
      margin-bottom: 38px;
      object-fit: contain;
      object-position: left center;
      filter: drop-shadow(0 16px 34px rgba(0,0,0,.74));
    }
    .subtitle {
      display: none;
      max-width: 520px;
      margin: 20px 0 0;
      color: rgba(247,234,212,.76);
      font-size: 14px;
      line-height: 1.85;
    }
    .meta {
      display: none;
      gap: 10px;
      margin-top: 28px;
      flex-wrap: wrap;
    }
    .meta span {
      padding: 8px 12px;
      border: 1px solid rgba(240,215,140,.18);
      border-radius: 999px;
      color: rgba(247,234,212,.72);
      background: rgba(6,7,11,.46);
      backdrop-filter: blur(12px);
      font-size: 12px;
    }
    .panel {
      align-self: end;
      display: grid;
      gap: 14px;
      width: min(420px, 100%);
      padding: 22px;
      border: 1px solid rgba(240,215,140,.16);
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(13,14,20,.86), rgba(7,8,12,.82)),
        rgba(6,7,11,.78);
      box-shadow: 0 28px 92px rgba(0,0,0,.52);
      backdrop-filter: blur(22px);
      transform: translateY(-24px);
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .panel h2 {
      margin: 0;
      color: #f0d78c;
      font-size: 18px;
      letter-spacing: .04em;
    }
    .state {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 74px;
      padding: 7px 10px;
      border-radius: 999px;
      text-align: center;
      color: #101014;
      background: #f0d78c;
      font-size: 12px;
      font-weight: 800;
    }
    .launcher-version {
      color: rgba(247,234,212,.58);
      font-size: 12px;
      letter-spacing: .04em;
    }
    .launcher-summary {
      min-height: 20px;
      color: rgba(247,234,212,.64);
      font-size: 13px;
      line-height: 1.6;
    }
    .path-box {
      display: grid;
      gap: 8px;
    }
    .path-box label {
      color: rgba(247,234,212,.58);
      font-size: 12px;
    }
    .path-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }
    .install-path {
      min-width: 0;
      padding: 13px 14px;
      border: 1px solid rgba(240,215,140,.15);
      border-radius: 12px;
      color: rgba(247,234,212,.76);
      background: rgba(255,255,255,.045);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    button {
      min-height: 44px;
      border: 1px solid rgba(240,215,140,.26);
      border-radius: 12px;
      color: #f0d78c;
      background: rgba(240,215,140,.08);
      font: inherit;
      cursor: pointer;
    }
    button:hover {
      border-color: rgba(240,215,140,.54);
      background: rgba(240,215,140,.14);
    }
    button:disabled {
      opacity: .72;
      cursor: default;
    }
    .primary {
      min-height: 58px;
      width: 100%;
      color: #100b04;
      border: 0;
      background: linear-gradient(135deg, #d4a754, #f0d78c);
      font-weight: 900;
      letter-spacing: .08em;
      box-shadow: 0 18px 48px rgba(212,167,84,.24);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border-radius: 999px;
      font-size: 17px;
    }
    .primary::before {
      content: "↓";
      display: inline-grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      color: #f0d78c;
      background: rgba(12,10,6,.92);
      font-size: 18px;
      line-height: 1;
    }
    body.is-installed .primary::before {
      content: "▶";
      font-size: 14px;
    }
    body.has-update .primary::before {
      content: "↓";
      font-size: 18px;
    }
    .primary-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }
    .settings-menu {
      position: relative;
    }
    .gear {
      width: 56px;
      min-height: 58px;
      border-radius: 50%;
      font-size: 28px;
      line-height: 1;
      color: rgba(247,234,212,.78);
      background: rgba(16,18,25,.82);
    }
    .manage-panel {
      position: absolute;
      right: 0;
      bottom: calc(100% + 10px);
      z-index: 4;
      display: grid;
      min-width: 210px;
      gap: 8px;
      padding: 10px;
      border: 1px solid rgba(240,215,140,.22);
      border-radius: 14px;
      background: rgba(9,10,15,.96);
      box-shadow: 0 18px 48px rgba(0,0,0,.42);
      backdrop-filter: blur(18px);
    }
    .manage-panel button {
      text-align: left;
      padding: 0 12px;
    }
    .manage-panel[hidden] {
      display: none;
    }
    .manage-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 8px;
      color: rgba(247,234,212,.72);
      font-size: 12px;
      white-space: nowrap;
    }
    .manage-toggle input { accent-color: #d4a754; }
    .danger {
      color: #f2aaa1;
      border-color: rgba(166,60,50,.5);
      background: rgba(166,60,50,.14);
    }
    .progress {
      display: grid;
      gap: 10px;
    }
    .track {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
    }
    .bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #9f7a22, #f0d78c);
      transition: width .25s ease;
    }
    .status {
      min-height: 34px;
      color: rgba(247,234,212,.62);
      font-size: 13px;
      line-height: 1.7;
      word-break: break-all;
    }
    .space-info,
    .update-info {
      min-height: 20px;
      color: rgba(247,234,212,.58);
      font-size: 12px;
      line-height: 1.5;
    }
    .update-info.ready {
      color: #f0d78c;
    }
    body.is-installed .path-box,
    body.is-installed .progress { display: none; }
    body.is-installed.is-updating .progress {
      display: grid;
    }
    .action-rail {
      position: fixed;
      top: 92px;
      right: 20px;
      z-index: 6;
      display: grid;
      gap: 14px;
      -webkit-app-region: no-drag;
    }
    .rail-button {
      position: relative;
      display: grid;
      place-items: center;
      width: 42px;
      min-height: 42px;
      padding: 0;
      border: 1px solid rgba(247,234,212,.16);
      border-radius: 50%;
      color: rgba(247,234,212,.72);
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
      transition: color .16s ease, opacity .16s ease, transform .16s ease, border-color .16s ease;
    }
    .rail-button svg {
      width: 23px;
      height: 23px;
      fill: currentColor;
      stroke: currentColor;
      stroke-width: 0;
      opacity: .9;
    }
    .rail-button:hover {
      color: #fff8e8;
      border-color: rgba(247,234,212,.34);
      background: transparent;
      transform: translateX(-2px);
      box-shadow: 0 0 18px rgba(247,234,212,.12);
    }
    .rail-button::after {
      content: attr(data-tip);
      position: absolute;
      right: calc(100% + 10px);
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      pointer-events: none;
      padding: 5px 8px;
      border-radius: 8px;
      color: rgba(247,234,212,.82);
      background: rgba(7,8,12,.88);
      white-space: nowrap;
      font-size: 11px;
      transition: opacity .16s ease;
    }
    .rail-button:hover::after {
      opacity: 1;
    }
    .notice-board {
      display: grid;
      gap: 10px;
      width: min(575px, 100%);
      margin-bottom: 18px;
    }
    .notice-visual {
      position: relative;
      overflow: hidden;
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 1px solid rgba(240,215,140,.16);
      border-radius: 8px;
      background: rgba(255,255,255,.04);
      box-shadow: 0 18px 54px rgba(0,0,0,.36);
    }
    .notice-visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: .9;
      filter: saturate(1.06) contrast(1.08);
      transition: opacity .28s ease;
    }
    .notice-visual::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,.04), rgba(0,0,0,.36));
      pointer-events: none;
    }
    .cover-dots {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 10px;
      z-index: 2;
      display: flex;
      justify-content: center;
      gap: 6px;
    }
    .cover-dots button {
      width: 8px;
      min-height: 8px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: rgba(247,234,212,.36);
      box-shadow: 0 0 0 1px rgba(0,0,0,.18);
    }
    .cover-dots button.active {
      width: 22px;
      border-radius: 999px;
      background: rgba(240,215,140,.92);
    }
    .notice-stack {
      display: grid;
      gap: 8px;
    }
    .notice-item {
      display: grid;
      gap: 3px;
      padding: 8px 10px;
      border: 1px solid rgba(240,215,140,.14);
      border-radius: 8px;
      background: rgba(255,255,255,.045);
    }
    .notice-item strong {
      color: #fff7e8;
      font-size: 12px;
    }
    .notice-item span {
      color: rgba(247,234,212,.62);
      font-size: 11px;
      line-height: 1.45;
    }
    .notice-card {
      min-height: 82px;
      padding: 12px;
      border: 1px solid rgba(240,215,140,.15);
      border-radius: 8px;
      background: rgba(255,255,255,.045);
    }
    .notice-card h3 {
      margin: 0 0 6px;
      color: #fff7e8;
      font-size: 13px;
    }
    .notice-card p {
      margin: 0;
      color: rgba(247,234,212,.62);
      font-size: 12px;
      line-height: 1.6;
    }
    .quick-links {
      position: fixed;
      left: 48px;
      right: 48px;
      bottom: 20px;
      z-index: 3;
      display: none;
      gap: 18px;
      align-items: center;
      color: rgba(247,234,212,.58);
      font-size: 12px;
    }
    .quick-links a,
    .quick-links button {
      min-height: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      color: inherit;
      background: transparent;
      text-decoration: none;
    }
    .quick-links a:hover,
    .quick-links button:hover {
      color: #f0d78c;
      background: transparent;
    }
    .qq-card {
      position: fixed;
      top: 148px;
      right: 76px;
      z-index: 12;
      width: 220px;
      padding: 12px 14px;
      border: 1px solid rgba(240,215,140,.22);
      border-radius: 8px;
      background: rgba(10,10,14,.94);
      box-shadow: 0 18px 48px rgba(0,0,0,.42);
      backdrop-filter: blur(18px);
    }
    .qq-card[hidden] {
      display: none;
    }
    .qq-card strong {
      display: block;
      margin-bottom: 8px;
      color: #fff7e8;
      font-size: 13px;
    }
    .qq-card span {
      display: block;
      color: rgba(247,234,212,.72);
      font-size: 12px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="drag-region"></div>
  <div class="window-controls">
    <button id="windowMinimize" title="Minimize">-</button>
    <button id="windowClose" title="Close">×</button>
  </div>
  <img
    class="poster"
    src="../manual-build/assets/official-posts/492288870839223557/cover.jpg"
    alt="">
  <video
    class="bg"
    src="../manual-build/assets/official-posts/492288870839223557/pv.mp4"
    autoplay
    muted
    loop
    playsinline></video>
  <div class="shade"></div>
  <main>
    <section class="hero">
      <div class="notice-board" id="noticeBoard"></div>
      <p class="eyebrow">Archive Launcher</p>
      <img class="title-mark" src="../manual-build/assets/logo/title-wordmark.png" alt="诸神终应知晓">
      <p class="subtitle">
        玩家自制史记档案馆启动器。日常打开时直接进入资料馆，
        更新、修复与目录管理集中在右侧齿轮菜单。
      </p>
      <div class="meta">
        <span>资料馆</span>
        <span>官方物料整理</span>
        <span>桌面客户端</span>
      </div>
    </section>
    <section class="panel">
      <div class="panel-head">
        <h2>游戏安装</h2>
        <div class="state" id="state">读取中</div>
      </div>
      <div class="launcher-version" id="launcherVersion">版本 v1.1.1</div>
      <div class="launcher-summary" id="launcherSummary">
        准备就绪，点击主按钮进入资料馆。
      </div>
      <div class="path-box">
        <label>安装位置</label>
        <div class="path-row">
          <div class="install-path" id="installPath">正在读取...</div>
          <button id="choose">更改</button>
        </div>
      </div>
      <div class="progress">
        <div class="track"><div class="bar" id="bar"></div></div>
        <div class="status" id="status">正在读取状态...</div>
      </div>
      <div class="primary-row">
        <button class="primary" id="install">安装</button>
        <div class="settings-menu">
          <button class="gear" id="manage" title="&#31649;&#29702;" aria-label="&#31649;&#29702;">&#9881;</button>
          <div class="manage-panel" id="managePanel" hidden>
            <button id="open">&#30446;&#24405;</button>
            <button class="danger" id="uninstall">&#21368;&#36733;</button>
          </div>
        </div>
      </div>
    </section>
  </main>
  <aside class="action-rail" id="actionRail">
    <button class="rail-button" id="railTapTap" data-tip="TapTap" aria-label="打开 TapTap 页面">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M7.5 3.5h9A4.5 4.5 0 0 1 21 8v8a4.5 4.5 0 0 1-4.5 4.5h-9A4.5 4.5 0 0 1 3 16V8a4.5 4.5 0 0 1 4.5-4.5zm.8 5.1a2.9 2.9 0 1 0 0 5.8 2.9 2.9 0 0 0 0-5.8zm7.4 0a2.9 2.9 0 1 0 0 5.8 2.9 2.9 0 0 0 0-5.8zM8.3 10.4a1.1 1.1 0 1 1 0 2.2 1.1 1.1 0 0 1 0-2.2zm7.4 0a1.1 1.1 0 1 1 0 2.2 1.1 1.1 0 0 1 0-2.2zM10 16.7h4a1 1 0 0 1 0 2h-4a1 1 0 0 1 0-2z"/>
      </svg>
    </button>
    <button class="rail-button" id="railQQ" data-tip="QQ群" aria-label="查看 QQ 群信息">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 2.7c-3.2 0-5.8 2.8-5.8 6.5v2.1c-1.5 1.3-2.5 3.1-2.5 5 0 1.6.7 2.8 1.9 3.4.7.4 1.4.1 1.9-.5 1.2 1.2 2.8 1.9 4.5 1.9s3.3-.7 4.5-1.9c.5.6 1.2.9 1.9.5 1.2-.6 1.9-1.8 1.9-3.4 0-1.9-1-3.7-2.5-5V9.2c0-3.7-2.6-6.5-5.8-6.5zm-2.1 7.2c.7 0 1.3.7 1.3 1.5s-.6 1.5-1.3 1.5-1.3-.7-1.3-1.5.6-1.5 1.3-1.5zm4.2 0c.7 0 1.3.7 1.3 1.5s-.6 1.5-1.3 1.5-1.3-.7-1.3-1.5.6-1.5 1.3-1.5zm-5.9 6c1 .7 2.3 1.1 3.8 1.1s2.8-.4 3.8-1.1c-.5 1.2-1.9 2.1-3.8 2.1s-3.3-.9-3.8-2.1z"/>
      </svg>
    </button>
    <button class="rail-button" id="railGithub" data-tip="GitHub">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 2C6.48 2 2 6.58 2 12.26c0 4.52 2.87 8.36 6.84 9.72.5.1.68-.22.68-.49v-1.72c-2.78.62-3.37-1.37-3.37-1.37-.45-1.19-1.11-1.51-1.11-1.51-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.57 2.35 1.12 2.92.86.09-.66.35-1.12.63-1.38-2.22-.26-4.56-1.14-4.56-5.07 0-1.12.39-2.04 1.03-2.76-.1-.26-.45-1.31.1-2.72 0 0 .84-.28 2.75 1.05A9.32 9.32 0 0 1 12 6.96c.85 0 1.7.12 2.5.35 1.9-1.33 2.74-1.05 2.74-1.05.55 1.41.2 2.46.1 2.72.64.72 1.03 1.64 1.03 2.76 0 3.94-2.34 4.8-4.57 5.06.36.32.68.95.68 1.92v2.77c0 .27.18.59.69.49A10.16 10.16 0 0 0 22 12.26C22 6.58 17.52 2 12 2z"/>
      </svg>
    </button>
  </aside>
  <nav class="quick-links" id="quickLinks"></nav>
  <script>
    const stateNode = document.getElementById('state');
    const pathNode = document.getElementById('installPath');
    const statusNode = document.getElementById('status');
    const barNode = document.getElementById('bar');
    const installButton = document.getElementById('install');
    const manageButton = document.getElementById('manage');
    const managePanel = document.getElementById('managePanel');
    const openButton = document.getElementById('open');
    const uninstallButton = document.getElementById('uninstall');
    const logsButton = document.createElement('button');
    const chooseButton = document.getElementById('choose');
    const windowMinimizeButton = document.getElementById('windowMinimize');
    const windowCloseButton = document.getElementById('windowClose');
    const noticeBoard = document.getElementById('noticeBoard');
    const quickLinks = document.getElementById('quickLinks');
    const pathBox = document.querySelector('.path-box');
    const panelTitle = document.querySelector('.panel h2');
    const launcherVersionNode = document.getElementById('launcherVersion');
    const launcherSummaryNode = document.getElementById('launcherSummary');
    const railTapTapButton = document.getElementById('railTapTap');
    const railQQButton = document.getElementById('railQQ');
    const railGithubButton = document.getElementById('railGithub');
    const qqCard = document.createElement('div');
    const spaceNode = document.createElement('div');
    const updateNode = document.createElement('div');
    const settingsButton = document.createElement('button');
    const shortcutButton = document.createElement('button');
    const checkUpdateButton = document.createElement('button');
    const updateButton = document.createElement('button');
    const repairButton = document.createElement('button');
    const reinstallButton = document.createElement('button');
    const closeAfterLaunchLabel = document.createElement('label');
    const closeAfterLaunchInput = document.createElement('input');

    spaceNode.className = 'space-info';
    updateNode.className = 'update-info';
    settingsButton.id = 'launcherSettings';
    shortcutButton.id = 'createShortcut';
    checkUpdateButton.id = 'checkUpdate';
    updateButton.id = 'update';
    repairButton.id = 'repair';
    reinstallButton.id = 'reinstall';
    logsButton.id = 'openLogs';
    settingsButton.textContent = '\u6e38\u620f\u8bbe\u7f6e';
    shortcutButton.textContent = '\u6dfb\u52a0\u684c\u9762\u5feb\u6377\u65b9\u5f0f';
    checkUpdateButton.textContent = '\u68c0\u67e5\u66f4\u65b0';
    updateButton.textContent = '\u66f4\u65b0';
    repairButton.textContent = '\u4fee\u590d';
    reinstallButton.textContent = '\u91cd\u65b0\u5b89\u88c5';
    closeAfterLaunchLabel.className = 'manage-toggle';
    closeAfterLaunchInput.type = 'checkbox';
    closeAfterLaunchLabel.appendChild(closeAfterLaunchInput);
    closeAfterLaunchLabel.appendChild(document.createTextNode('\u542f\u52a8\u540e\u81ea\u52a8\u5173\u95ed'));
    logsButton.textContent = '\u65e5\u5fd7';
    updateButton.hidden = true;
    qqCard.className = 'qq-card';
    qqCard.hidden = true;
    pathBox.appendChild(spaceNode);
    pathBox.appendChild(updateNode);
    document.body.appendChild(qqCard);
    managePanel.appendChild(settingsButton);
    managePanel.appendChild(shortcutButton);
    managePanel.appendChild(openButton);
    managePanel.appendChild(repairButton);
    managePanel.appendChild(checkUpdateButton);
    managePanel.appendChild(updateButton);
    managePanel.appendChild(reinstallButton);
    managePanel.appendChild(logsButton);
    managePanel.appendChild(closeAfterLaunchLabel);
    managePanel.appendChild(uninstallButton);

    windowMinimizeButton.addEventListener('click', () => {
      window.ZhushenInstaller.windowMinimize();
    });
    windowCloseButton.addEventListener('click', () => {
      window.ZhushenInstaller.windowClose();
    });

    const notices = [
      {
        tab: '\u6700\u65b0',
        title: '\u8d44\u6599\u9986\u5df2\u5c31\u7eea',
        body: '\u6536\u5f55\u5b98\u65b9\u52a8\u6001\u3001\u89d2\u8272\u8d44\u6599\u3001\u6982\u5ff5\u8bbe\u5b9a\u4e0e\u793e\u533a\u4e8c\u521b\uff0c\u9002\u5408\u65e5\u5e38\u67e5\u9605\u3002'
      },
      {
        tab: '\u7248\u672c',
        title: 'v1.1.1',
        body: '\u672c\u7248\u672c\u4f18\u5316\u5b89\u88c5\u3001\u4fee\u590d\u3001\u91cd\u88c5\u548c\u66f4\u65b0\u6d41\u7a0b\uff0c\u4e3b\u6309\u94ae\u805a\u7126\u542f\u52a8\u4f53\u9a8c\u3002'
      },
      {
        tab: '\u7ef4\u62a4',
        title: '\u6863\u6848\u7ef4\u62a4\u63d0\u793a',
        body: '\u6587\u4ef6\u7f3a\u5931\u6216\u542f\u52a8\u5f02\u5e38\u65f6\uff0c\u53ef\u4ece\u53f3\u4fa7\u9f7f\u8f6e\u83dc\u5355\u8fdb\u884c\u4fee\u590d\u3002'
      }
    ];
    const coverImages = [
      '../manual-build/assets/zy/\u7fa4\u53cb\u7b11\u8bdd\u5408\u96c6.jpg',
      '../manual-build/assets/zy/\u73a9\u5bb6\u4e8c\u521b.jpg',
      '../manual-build/assets/zy/\u8bf8\u795e\u7ec8\u5e94\u77e5\u6653\u6982\u5ff5\u56fe.jpg',
      '../manual-build/assets/zy/\u8bf8\u795e\u7ec8\u5e94\u77e5\u6653\u89d2\u8272\u8bbe\u5b9a.jpg'
    ];
    let coverIndex = 0;

    function renderNotice() {
      noticeBoard.innerHTML = '';
      const visual = document.createElement('div');
      const visualImage = document.createElement('img');
      const dots = document.createElement('div');
      const stack = document.createElement('div');
      visual.className = 'notice-visual';
      visualImage.src = coverImages[coverIndex];
      visualImage.alt = '';
      visualImage.decoding = 'async';
      dots.className = 'cover-dots';
      stack.className = 'notice-stack';
      const dotButtons = coverImages.map((image, index) => {
        const dot = document.createElement('button');
        dot.type = 'button';
        dot.classList.toggle('active', index === coverIndex);
        dot.addEventListener('click', () => {
          setCover(index);
        });
        dots.appendChild(dot);
        return dot;
      });
      const setCover = (index) => {
        coverIndex = index;
        dotButtons.forEach((dot, dotIndex) => {
          dot.classList.toggle('active', dotIndex === coverIndex);
        });
        visualImage.style.opacity = '.35';
        window.setTimeout(() => {
          visualImage.src = coverImages[coverIndex];
          visualImage.style.opacity = '.9';
        }, 220);
      };
      notices.forEach((notice, index) => {
        const item = document.createElement('div');
        const title = document.createElement('strong');
        const body = document.createElement('span');
        item.className = 'notice-item';
        title.textContent = notice.tab + ' · ' + notice.title;
        body.textContent = notice.body;
        item.appendChild(title);
        item.appendChild(body);
        stack.appendChild(item);
      });
      visual.appendChild(visualImage);
      visual.appendChild(dots);
      noticeBoard.appendChild(visual);
      noticeBoard.appendChild(stack);
      window.setInterval(() => {
        setCover((coverIndex + 1) % coverImages.length);
      }, 4500);
    }

    function renderQuickLinks() {
      quickLinks.innerHTML = '';
      qqCard.innerHTML = '';
      const qqTitle = document.createElement('strong');
      const qqPrimary = document.createElement('span');
      const qqSecondary = document.createElement('span');
      qqTitle.textContent = 'QQ\u7fa4';
      qqPrimary.textContent = '\u5b98\u65b9\u4e00\u7fa4\uff1a913044248';
      qqSecondary.textContent = '\u5b98\u65b9\u4e8c\u7fa4\uff1a130340208';
      qqCard.appendChild(qqTitle);
      qqCard.appendChild(qqPrimary);
      qqCard.appendChild(qqSecondary);
    }


    let installed = false;
    let busy = false;
    let updateAvailable = false;
    let qqCardPinned = false;
    let qqHideTimer = null;

    const setStatus = (text) => { statusNode.textContent = text; };
    const setProgress = (percent) => {
      barNode.style.width = Math.max(0, Math.min(100, Number(percent) || 0)) + '%';
    };
    const setManageOpen = (open) => {
      managePanel.hidden = !open;
    };
    const setBusy = (value) => {
      busy = value;
      installButton.disabled = value;
      chooseButton.disabled = value || installed;
      manageButton.disabled = value;
      uninstallButton.disabled = value || !installed;
      openButton.disabled = value || !installed;
      logsButton.disabled = value;
      checkUpdateButton.disabled = value;
      shortcutButton.disabled = value;
      settingsButton.disabled = value;
      updateButton.disabled = value || !installed || !updateAvailable;
      repairButton.disabled = value || !installed;
      reinstallButton.disabled = value || !installed;
      railTapTapButton.disabled = value;
      railQQButton.disabled = value;
      railGithubButton.disabled = value;
      if (value || !installed) {
        setManageOpen(false);
      }
    };
    const syncButtons = () => {
      stateNode.textContent = installed ? '\u5df2\u5b89\u88c5' : '\u5f85\u5b89\u88c5';
      installButton.textContent = updateAvailable
        ? '\u66f4\u65b0\u6e38\u620f'
        : installed
          ? '\u542f\u52a8'
          : '\u7acb\u5373\u5b89\u88c5';
      setBusy(false);
    };

    async function refresh() {
      const status = await window.ZhushenInstaller.getStatus();
      installed = status.installed;
      document.body.classList.toggle('is-installed', installed);
      document.body.classList.toggle('has-update', updateAvailable);
      panelTitle.textContent = installed ? '\u8bf8\u795e\u7ec8\u5e94\u77e5\u6653' : '\u6e38\u620f\u5b89\u88c5';
      launcherVersionNode.textContent = '\u7248\u672c v' + (status.version || '1.1.1');
      closeAfterLaunchInput.checked = status.closeAfterLaunch !== false;
      pathNode.textContent = status.installDir;
      if (status.space) {
        spaceNode.textContent = '\u6240\u9700\u7a7a\u95f4 '
          + status.space.requiredText + ' / \u53ef\u7528 '
          + status.space.freeText;
      }
      if (status.healthProblems > 0) {
        launcherSummaryNode.textContent = '\u68c0\u6d4b\u5230\u6587\u4ef6\u9700\u8981\u4fee\u590d\uff0c\u53ef\u4ece\u83dc\u5355\u6267\u884c\u4e00\u952e\u4fee\u590d\u3002';
        updateNode.textContent = '\u68c0\u6d4b\u5230 '
          + status.healthProblems + ' \u4e2a\u6587\u4ef6\u9700\u8981\u4fee\u590d\u3002';
        updateNode.classList.add('ready');
      } else if (!updateAvailable) {
        launcherSummaryNode.textContent = installed
          ? '\u51c6\u5907\u5c31\u7eea\uff0c\u70b9\u51fb\u4e3b\u6309\u94ae\u8fdb\u5165\u8d44\u6599\u9986\u3002'
          : '\u9009\u62e9\u5b89\u88c5\u4f4d\u7f6e\u540e\u5373\u53ef\u5199\u5165\u684c\u9762\u5ba2\u6237\u7aef\u3002';
        updateNode.textContent = installed
          ? '\u5df2\u662f\u6700\u65b0\u7248\u672c\u3002'
          : '\u5c1a\u672a\u5b89\u88c5\u3002';
        updateNode.classList.remove('ready');
      }
      setProgress(installed ? 100 : 0);
      setStatus(installed
        ? ''
        : status.payloadExists
          ? '\u51c6\u5907\u5c31\u7eea\uff0c\u70b9\u51fb\u7acb\u5373\u5b89\u88c5\u3002'
          : '\u672a\u627e\u5230\u5185\u7f6e\u5ba2\u6237\u7aef\u8d44\u6e90\uff0c\u8bf7\u91cd\u65b0\u6784\u5efa\u5b89\u88c5\u5668\u3002');
      syncButtons();
    }

    window.ZhushenInstaller.onProgress((payload) => {
      setProgress(payload.percent);
      setStatus(payload.message);
    });

    chooseButton.addEventListener('click', async () => {
      const installDir = await window.ZhushenInstaller.chooseInstallDir();
      pathNode.textContent = installDir;
      setStatus('\u5b89\u88c5\u4f4d\u7f6e\u5df2\u66f4\u65b0\u3002');
      await refresh();
    });

    installButton.addEventListener('click', async () => {
      if (installed && updateAvailable) {
        updateButton.click();
        return;
      }
      if (installed) {
        const result = await window.ZhushenInstaller.launch();
        const ok = result === true || !!(result && result.ok);
        setStatus(ok
          ? '\u5ba2\u6237\u7aef\u5df2\u542f\u52a8\u3002'
          : result && result.message
            ? result.message
            : '\u5ba2\u6237\u7aef\u542f\u52a8\u5931\u8d25\u3002');
        return;
      }
      setBusy(true);
      setProgress(0);
      setStatus('\u6b63\u5728\u5f00\u59cb\u5b89\u88c5...');
      const ok = await window.ZhushenInstaller.install();
      installed = ok;
      await refresh();
    });

    manageButton.addEventListener('click', () => {
      if (busy) {
        return;
      }
      setManageOpen(managePanel.hidden);
    });

    settingsButton.addEventListener('click', () => {
      setManageOpen(false);
      setStatus('\u542f\u52a8\u5668\u8bbe\u7f6e\u5df2\u6536\u7eb3\u5728\u83dc\u5355\u4e2d\uff0c\u53ef\u5207\u6362\u201c\u542f\u52a8\u540e\u81ea\u52a8\u5173\u95ed\u201d\u3002');
    });

    shortcutButton.addEventListener('click', async () => {
      setManageOpen(false);
      setStatus('\u6b63\u5728\u6dfb\u52a0\u684c\u9762\u5feb\u6377\u65b9\u5f0f...');
      const ok = await window.ZhushenInstaller.createShortcuts();
      setStatus(ok
        ? '\u5df2\u6dfb\u52a0\u684c\u9762\u548c\u5f00\u59cb\u83dc\u5355\u5feb\u6377\u65b9\u5f0f\u3002'
        : '\u5feb\u6377\u65b9\u5f0f\u6dfb\u52a0\u5931\u8d25\u3002');
    });

    closeAfterLaunchInput.addEventListener('change', async () => {
      closeAfterLaunchInput.checked = await window.ZhushenInstaller.setCloseAfterLaunch(
        closeAfterLaunchInput.checked
      );
    });

    document.addEventListener('click', (event) => {
      if (!event.target.closest('.settings-menu')) {
        setManageOpen(false);
      }
      if (!event.target.closest('.action-rail') && !event.target.closest('.qq-card')) {
        qqCardPinned = false;
        qqCard.hidden = true;
      }
    });

    uninstallButton.addEventListener('click', async () => {
      setManageOpen(false);
      setBusy(true);
      setStatus('\u6b63\u5728\u5378\u8f7d...');
      const ok = await window.ZhushenInstaller.uninstall();
      installed = !ok;
      await refresh();
    });

    openButton.addEventListener('click', async () => {
      setManageOpen(false);
      const opened = await window.ZhushenInstaller.openInstallDir();
      setStatus(opened ? '\u5df2\u6253\u5f00\u5b89\u88c5\u76ee\u5f55\u3002' : '\u5c1a\u672a\u627e\u5230\u5b89\u88c5\u76ee\u5f55\u3002');
    });

    logsButton.addEventListener('click', async () => {
      setManageOpen(false);
      const result = await window.ZhushenInstaller.openLogs();
      setStatus(result && result.ok
        ? '\u5df2\u6253\u5f00\u65e5\u5fd7\u76ee\u5f55\u3002'
        : '\u65e5\u5fd7\u76ee\u5f55\u6253\u5f00\u5931\u8d25\u3002');
    });

    checkUpdateButton.addEventListener('click', async () => {
      setManageOpen(false);
      setStatus('\u6b63\u5728\u68c0\u67e5\u66f4\u65b0...');
      const result = await window.ZhushenInstaller.checkUpdate();
      updateAvailable = !!(result && result.available);
      updateButton.hidden = !updateAvailable;
      document.body.classList.toggle('has-update', updateAvailable);
      if (result && result.error) {
        updateNode.textContent = '\u66f4\u65b0\u68c0\u67e5\u5931\u8d25\uff1a' + result.error;
        launcherSummaryNode.textContent = '\u66f4\u65b0\u68c0\u67e5\u5931\u8d25\uff0c\u53ef\u7a0d\u540e\u91cd\u8bd5\u3002';
      } else if (updateAvailable) {
        updateNode.textContent = '\u53d1\u73b0\u65b0\u7248\u672c\u3002';
        launcherSummaryNode.textContent = '\u53d1\u73b0\u66f4\u65b0\uff0c\u4e3b\u6309\u94ae\u5df2\u5207\u6362\u4e3a\u66f4\u65b0\u6e38\u620f\u3002';
        updateNode.classList.add('ready');
      } else {
        updateNode.textContent = '\u5df2\u662f\u6700\u65b0\u7248\u672c\u3002';
        launcherSummaryNode.textContent = '\u5df2\u662f\u6700\u65b0\u7248\u672c\uff0c\u53ef\u76f4\u63a5\u542f\u52a8\u3002';
        updateNode.classList.remove('ready');
      }
      syncButtons();
      setBusy(false);
    });

    updateButton.addEventListener('click', async () => {
      setManageOpen(false);
      setBusy(true);
      document.body.classList.add('is-updating');
      setProgress(0);
      setStatus('\u6b63\u5728\u66f4\u65b0...');
      const result = await window.ZhushenInstaller.update();
      document.body.classList.remove('is-updating');
      if (result) {
        updateAvailable = false;
        document.body.classList.remove('has-update');
        updateButton.hidden = true;
        setStatus('\u66f4\u65b0\u5b8c\u6210\u3002');
        await refresh();
        return;
      }
      setBusy(false);
      setStatus('\u66f4\u65b0\u672a\u5b8c\u6210\uff0c\u8bf7\u6839\u636e\u63d0\u793a\u5904\u7406\u540e\u91cd\u8bd5\u3002');
    });

    repairButton.addEventListener('click', async () => {
      setManageOpen(false);
      setBusy(true);
      setStatus('\u6b63\u5728\u4fee\u590d...');
      const result = await window.ZhushenInstaller.repair();
      setStatus(result ? '\u4fee\u590d\u5b8c\u6210\u3002' : '\u4fee\u590d\u672a\u5b8c\u6210\u3002');
      await refresh();
    });

    reinstallButton.addEventListener('click', async () => {
      setManageOpen(false);
      setBusy(true);
      setProgress(0);
      setStatus('\u6b63\u5728\u91cd\u65b0\u5b89\u88c5...');
      const ok = await window.ZhushenInstaller.reinstall();
      installed = !!ok;
      await refresh();
    });

    railTapTapButton.addEventListener('click', () => {
      window.ZhushenInstaller.openExternal('https://www.taptap.cn/app/513986');
    });

    const showQQCard = () => {
      window.clearTimeout(qqHideTimer);
      qqCard.hidden = false;
    };
    const scheduleHideQQCard = () => {
      window.clearTimeout(qqHideTimer);
      if (qqCardPinned) {
        return;
      }
      qqHideTimer = window.setTimeout(() => {
        if (!qqCardPinned) {
          qqCard.hidden = true;
        }
      }, 180);
    };
    railQQButton.addEventListener('mouseenter', showQQCard);
    railQQButton.addEventListener('mouseleave', scheduleHideQQCard);
    qqCard.addEventListener('mouseenter', showQQCard);
    qqCard.addEventListener('mouseleave', scheduleHideQQCard);
    railQQButton.addEventListener('click', (event) => {
      event.stopPropagation();
      qqCardPinned = qqCard.hidden ? true : !qqCardPinned;
      qqCard.hidden = false;
    });

    railGithubButton.addEventListener('click', () => {
      window.ZhushenInstaller.openExternal('https://github.com/Gao2612/zhushen/releases/latest');
    });

    renderNotice();
    renderQuickLinks();
    refresh();
  </script>
</body>
</html>
