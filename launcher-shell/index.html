<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>诸神终应知晓</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body {
      font-family: "Microsoft YaHei UI", "PingFang SC", sans-serif;
      color: #f7ead4;
      background: #06070b;
    }
    .bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: .74;
      filter: saturate(1.05) contrast(1.12);
    }
    .poster {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: .72;
      filter: saturate(1.05) contrast(1.08);
    }
    .shade {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(4,5,8,.9), rgba(4,5,8,.46) 42%, rgba(4,5,8,.12) 70%, rgba(4,5,8,.86)),
        linear-gradient(0deg, rgba(4,5,8,.98), rgba(4,5,8,.34) 46%, rgba(4,5,8,.56));
    }
    .drag-region {
      position: fixed;
      top: 0;
      left: 0;
      right: 96px;
      height: 42px;
      z-index: 10;
      -webkit-app-region: drag;
    }
    .window-controls {
      position: fixed;
      top: 14px;
      right: 18px;
      z-index: 12;
      display: flex;
      gap: 10px;
      -webkit-app-region: no-drag;
    }
    .window-controls button {
      width: 28px;
      min-height: 28px;
      border: 1px solid rgba(247,234,212,.2);
      border-radius: 50%;
      color: rgba(247,234,212,.68);
      background: rgba(6,7,11,.36);
      line-height: 1;
    }
    .window-controls button:hover {
      color: #100b04;
      background: #f0d78c;
    }
    main {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(440px, 1fr) 392px;
      height: 100vh;
      padding: 44px 56px 78px 64px;
      gap: 32px;
    }
    .hero {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-width: 0;
      padding-bottom: 6px;
    }
    .eyebrow {
      margin: 0 0 14px;
      color: #f0d78c;
      font-size: 13px;
      letter-spacing: .28em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      color: #fff7e8;
      font-size: clamp(60px, 8vw, 108px);
      line-height: .96;
      letter-spacing: .04em;
      text-shadow: 0 16px 48px rgba(0,0,0,.78);
    }
    .title-mark {
      display: block;
      width: min(520px, 40vw);
      max-height: 108px;
      height: auto;
      margin-bottom: 38px;
      object-fit: contain;
      object-position: left center;
      filter: drop-shadow(0 16px 34px rgba(0,0,0,.74));
    }
    .subtitle {
      display: none;
      max-width: 520px;
      margin: 20px 0 0;
      color: rgba(247,234,212,.76);
      font-size: 14px;
      line-height: 1.85;
    }
    .meta {
      display: none;
      gap: 10px;
      margin-top: 28px;
      flex-wrap: wrap;
    }
    .meta span {
      padding: 8px 12px;
      border: 1px solid rgba(240,215,140,.18);
      border-radius: 999px;
      color: rgba(247,234,212,.72);
      background: rgba(6,7,11,.46);
      backdrop-filter: blur(12px);
      font-size: 12px;
    }
    .panel {
      align-self: end;
      display: grid;
      gap: 14px;
      padding: 22px;
      border: 1px solid rgba(240,215,140,.22);
      border-radius: 10px;
      background: rgba(9,10,15,.78);
      box-shadow: 0 28px 92px rgba(0,0,0,.52);
      backdrop-filter: blur(22px);
      transform: translateY(-24px);
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .panel h2 {
      margin: 0;
      color: #f0d78c;
      font-size: 18px;
      letter-spacing: .04em;
    }
    .state {
      display: none;
      min-width: 74px;
      padding: 7px 10px;
      border-radius: 999px;
      text-align: center;
      color: #101014;
      background: #f0d78c;
      font-size: 12px;
      font-weight: 800;
    }
    .path-box {
      display: grid;
      gap: 8px;
    }
    .path-box label {
      color: rgba(247,234,212,.58);
      font-size: 12px;
    }
    .path-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }
    .install-path {
      min-width: 0;
      padding: 13px 14px;
      border: 1px solid rgba(240,215,140,.15);
      border-radius: 12px;
      color: rgba(247,234,212,.76);
      background: rgba(255,255,255,.045);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    button {
      min-height: 44px;
      border: 1px solid rgba(240,215,140,.26);
      border-radius: 12px;
      color: #f0d78c;
      background: rgba(240,215,140,.08);
      font: inherit;
      cursor: pointer;
    }
    button:hover {
      border-color: rgba(240,215,140,.54);
      background: rgba(240,215,140,.14);
    }
    button:disabled {
      opacity: .48;
      cursor: default;
    }
    .primary {
      min-height: 58px;
      width: 100%;
      color: #100b04;
      border: 0;
      background: linear-gradient(135deg, #d4a754, #f0d78c);
      font-weight: 900;
      letter-spacing: .08em;
      box-shadow: 0 18px 48px rgba(212,167,84,.24);
    }
    .primary-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }
    .settings-menu {
      position: relative;
    }
    .gear {
      width: 56px;
      min-height: 58px;
      border-radius: 8px;
      font-size: 24px;
      line-height: 1;
    }
    .manage-panel {
      position: absolute;
      right: 0;
      bottom: calc(100% + 10px);
      z-index: 4;
      display: grid;
      min-width: 150px;
      gap: 8px;
      padding: 10px;
      border: 1px solid rgba(240,215,140,.22);
      border-radius: 14px;
      background: rgba(9,10,15,.96);
      box-shadow: 0 18px 48px rgba(0,0,0,.42);
      backdrop-filter: blur(18px);
    }
    .manage-panel[hidden] {
      display: none;
    }
    .manage-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 8px;
      color: rgba(247,234,212,.72);
      font-size: 12px;
      white-space: nowrap;
    }
    .manage-toggle input { accent-color: #d4a754; }
    .danger {
      color: #f2aaa1;
      border-color: rgba(166,60,50,.5);
      background: rgba(166,60,50,.14);
    }
    .progress {
      display: grid;
      gap: 10px;
    }
    .track {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
    }
    .bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #9f7a22, #f0d78c);
      transition: width .25s ease;
    }
    .status {
      min-height: 34px;
      color: rgba(247,234,212,.62);
      font-size: 13px;
      line-height: 1.7;
      word-break: break-all;
    }
    .space-info,
    .update-info {
      min-height: 20px;
      color: rgba(247,234,212,.58);
      font-size: 12px;
      line-height: 1.5;
    }
    .update-info.ready {
      color: #f0d78c;
    }
    body.is-installed .panel h2 { margin-bottom: 0; }
    body.is-installed .panel { align-self: center; transform: none; }
    body.is-installed .path-box,
    body.is-installed .progress { display: none; }
    body.is-installed.is-busy .progress { display: grid; }
    .notice-board {
      display: grid;
      gap: 10px;
      width: min(575px, 100%);
      margin-bottom: 18px;
    }
    .notice-visual {
      position: relative;
      overflow: hidden;
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 1px solid rgba(240,215,140,.16);
      border-radius: 8px;
      background: rgba(255,255,255,.04);
      box-shadow: 0 18px 54px rgba(0,0,0,.36);
    }
    .notice-visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: .9;
      filter: saturate(1.06) contrast(1.08);
      transition: opacity .28s ease;
    }
    .notice-visual::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,.04), rgba(0,0,0,.36));
      pointer-events: none;
    }
    .cover-dots {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 10px;
      z-index: 2;
      display: flex;
      justify-content: center;
      gap: 6px;
    }
    .cover-dots button {
      width: 8px;
      min-height: 8px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: rgba(247,234,212,.36);
      box-shadow: 0 0 0 1px rgba(0,0,0,.18);
    }
    .cover-dots button.active {
      width: 22px;
      border-radius: 999px;
      background: rgba(240,215,140,.92);
    }
    .notice-stack {
      display: grid;
      gap: 8px;
    }
    .notice-item {
      display: grid;
      gap: 3px;
      padding: 8px 10px;
      border: 1px solid rgba(240,215,140,.14);
      border-radius: 8px;
      background: rgba(255,255,255,.045);
    }
    .notice-item strong {
      color: #fff7e8;
      font-size: 12px;
    }
    .notice-item span {
      color: rgba(247,234,212,.62);
      font-size: 11px;
      line-height: 1.45;
    }
    .notice-card {
      min-height: 82px;
      padding: 12px;
      border: 1px solid rgba(240,215,140,.15);
      border-radius: 8px;
      background: rgba(255,255,255,.045);
    }
    .notice-card h3 {
      margin: 0 0 6px;
      color: #fff7e8;
      font-size: 13px;
    }
    .notice-card p {
      margin: 0;
      color: rgba(247,234,212,.62);
      font-size: 12px;
      line-height: 1.6;
    }
    .quick-links {
      position: fixed;
      left: 48px;
      right: 48px;
      bottom: 20px;
      z-index: 3;
      display: flex;
      gap: 18px;
      align-items: center;
      color: rgba(247,234,212,.58);
      font-size: 12px;
    }
    .quick-links a,
    .quick-links button {
      min-height: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      color: inherit;
      background: transparent;
      text-decoration: none;
    }
    .quick-links a:hover,
    .quick-links button:hover {
      color: #f0d78c;
      background: transparent;
    }
    .qq-card {
      position: fixed;
      left: 208px;
      bottom: 50px;
      z-index: 12;
      width: 220px;
      padding: 12px 14px;
      border: 1px solid rgba(240,215,140,.22);
      border-radius: 8px;
      background: rgba(10,10,14,.94);
      box-shadow: 0 18px 48px rgba(0,0,0,.42);
      backdrop-filter: blur(18px);
    }
    .qq-card[hidden] {
      display: none;
    }
    .qq-card strong {
      display: block;
      margin-bottom: 8px;
      color: #fff7e8;
      font-size: 13px;
    }
    .qq-card span {
      display: block;
      color: rgba(247,234,212,.72);
      font-size: 12px;
      line-height: 1.8;
    }
    .profile-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 48px;
      background: rgba(0,0,0,.42);
      backdrop-filter: blur(10px);
    }
    .profile-overlay[hidden] {
      display: none;
    }
    .profile-panel {
      width: min(920px, calc(100vw - 96px));
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 16px;
      padding: 18px;
      border: 1px solid rgba(240,215,140,.2);
      border-radius: 10px;
      background: rgba(9,10,15,.92);
      box-shadow: 0 30px 96px rgba(0,0,0,.58);
    }
    .profile-side,
    .profile-main,
    .profile-card {
      border: 1px solid rgba(240,215,140,.14);
      border-radius: 8px;
      background: rgba(255,255,255,.045);
    }
    .profile-side {
      display: grid;
      align-content: start;
      gap: 14px;
      padding: 16px;
    }
    .profile-avatar {
      width: 76px;
      height: 76px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(240,215,140,.35);
      border-radius: 50%;
      color: #100b04;
      background: #f0d78c;
      font-size: 30px;
      font-weight: 900;
    }
    .profile-name {
      margin: 0;
      color: #fff7e8;
      font-size: 20px;
    }
    .profile-muted {
      margin: 0;
      color: rgba(247,234,212,.58);
      font-size: 12px;
      line-height: 1.65;
      word-break: break-all;
    }
    .profile-main {
      display: grid;
      gap: 12px;
      padding: 16px;
    }
    .profile-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .profile-head h2 {
      margin: 0;
      color: #f0d78c;
      font-size: 18px;
    }
    .profile-close {
      width: 32px;
      min-height: 32px;
      border-radius: 50%;
      line-height: 1;
    }
    .profile-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .profile-card {
      display: grid;
      gap: 10px;
      padding: 12px;
    }
    .profile-card h3 {
      margin: 0;
      color: #fff7e8;
      font-size: 13px;
    }
    .profile-field {
      display: grid;
      gap: 6px;
    }
    .profile-field label,
    .profile-toggle {
      color: rgba(247,234,212,.64);
      font-size: 12px;
    }
    .profile-field input,
    .profile-field textarea {
      width: 100%;
      border: 1px solid rgba(240,215,140,.16);
      border-radius: 8px;
      color: #fff7e8;
      background: rgba(255,255,255,.055);
      font: inherit;
      font-size: 13px;
    }
    .profile-field input {
      min-height: 38px;
      padding: 0 10px;
    }
    .profile-field textarea {
      min-height: 72px;
      padding: 9px 10px;
      resize: none;
    }
    .profile-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .profile-toggle input {
      accent-color: #f0d78c;
    }
    .profile-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .profile-actions button {
      min-height: 36px;
      padding: 0 12px;
      border-radius: 8px;
      font-size: 12px;
    }
    .profile-cloud {
      opacity: .58;
      cursor: default;
    }
  </style>
</head>
<body>
  <div class="drag-region"></div>
  <div class="window-controls">
    <button id="windowMinimize" title="Minimize">-</button>
    <button id="windowClose" title="Close">×</button>
  </div>
  <img
    class="poster"
    src="../manual-build/assets/official-posts/492288870839223557/cover.jpg"
    alt="">
  <video
    class="bg"
    src="../manual-build/assets/official-posts/492288870839223557/pv.mp4"
    autoplay
    muted
    loop
    playsinline></video>
  <div class="shade"></div>
  <main>
    <section class="hero">
      <div class="notice-board" id="noticeBoard"></div>
      <p class="eyebrow">Archive Launcher</p>
      <img class="title-mark" src="../manual-build/assets/logo/title-wordmark.png" alt="诸神终应知晓">
      <p class="subtitle">
        玩家自制史记档案馆启动器。日常打开时直接进入资料馆，
        更新、修复与目录管理集中在右侧齿轮菜单。
      </p>
      <div class="meta">
        <span>资料馆</span>
        <span>官方物料整理</span>
        <span>桌面客户端</span>
      </div>
    </section>
    <section class="panel">
      <div class="panel-head">
        <h2>游戏安装</h2>
        <div class="state" id="state">读取中</div>
      </div>
      <div class="path-box">
        <label>安装位置</label>
        <div class="path-row">
          <div class="install-path" id="installPath">正在读取...</div>
          <button id="choose">更改</button>
        </div>
      </div>
      <div class="progress">
        <div class="track"><div class="bar" id="bar"></div></div>
        <div class="status" id="status">正在读取状态...</div>
      </div>
      <div class="primary-row">
        <button class="primary" id="install">安装</button>
        <div class="settings-menu">
          <button class="gear" id="manage" title="&#31649;&#29702;" aria-label="&#31649;&#29702;">&#9881;</button>
          <div class="manage-panel" id="managePanel" hidden>
            <button id="open">&#30446;&#24405;</button>
            <button class="danger" id="uninstall">&#21368;&#36733;</button>
          </div>
        </div>
      </div>
    </section>
  </main>
  <nav class="quick-links" id="quickLinks"></nav>
  <script>
    const stateNode = document.getElementById('state');
    const pathNode = document.getElementById('installPath');
    const statusNode = document.getElementById('status');
    const barNode = document.getElementById('bar');
    const installButton = document.getElementById('install');
    const manageButton = document.getElementById('manage');
    const managePanel = document.getElementById('managePanel');
    const openButton = document.getElementById('open');
    const uninstallButton = document.getElementById('uninstall');
    const logsButton = document.createElement('button');
    const chooseButton = document.getElementById('choose');
    const windowMinimizeButton = document.getElementById('windowMinimize');
    const windowCloseButton = document.getElementById('windowClose');
    const noticeBoard = document.getElementById('noticeBoard');
    const quickLinks = document.getElementById('quickLinks');
    const pathBox = document.querySelector('.path-box');
    const panelTitle = document.querySelector('.panel h2');
    const qqCard = document.createElement('div');
    const profileOverlay = document.createElement('div');
    let currentProfile = null;
    const spaceNode = document.createElement('div');
    const updateNode = document.createElement('div');
    const checkUpdateButton = document.createElement('button');
    const updateButton = document.createElement('button');
    const repairButton = document.createElement('button');
    const reinstallButton = document.createElement('button');
    const closeAfterLaunchLabel = document.createElement('label');
    const closeAfterLaunchInput = document.createElement('input');

    spaceNode.className = 'space-info';
    updateNode.className = 'update-info';
    checkUpdateButton.id = 'checkUpdate';
    updateButton.id = 'update';
    repairButton.id = 'repair';
    reinstallButton.id = 'reinstall';
    logsButton.id = 'openLogs';
    checkUpdateButton.textContent = '\u68c0\u67e5\u66f4\u65b0';
    updateButton.textContent = '\u66f4\u65b0';
    repairButton.textContent = '\u4fee\u590d';
    reinstallButton.textContent = '\u91cd\u65b0\u5b89\u88c5';
    closeAfterLaunchLabel.className = 'manage-toggle';
    closeAfterLaunchInput.type = 'checkbox';
    closeAfterLaunchLabel.appendChild(closeAfterLaunchInput);
    closeAfterLaunchLabel.appendChild(document.createTextNode('\u542f\u52a8\u540e\u81ea\u52a8\u5173\u95ed'));
    logsButton.textContent = '\u65e5\u5fd7';
    updateButton.hidden = true;
    qqCard.className = 'qq-card';
    qqCard.hidden = true;
    profileOverlay.className = 'profile-overlay';
    profileOverlay.hidden = true;
    pathBox.appendChild(spaceNode);
    pathBox.appendChild(updateNode);
    document.body.appendChild(qqCard);
    document.body.appendChild(profileOverlay);
    managePanel.insertBefore(reinstallButton, openButton);
    managePanel.insertBefore(repairButton, reinstallButton);
    managePanel.insertBefore(updateButton, repairButton);
    managePanel.insertBefore(checkUpdateButton, updateButton);
    managePanel.insertBefore(logsButton, uninstallButton);
    managePanel.insertBefore(closeAfterLaunchLabel, uninstallButton);

    windowMinimizeButton.addEventListener('click', () => {
      window.ZhushenInstaller.windowMinimize();
    });
    windowCloseButton.addEventListener('click', () => {
      window.ZhushenInstaller.windowClose();
    });

    const notices = [
      {
        tab: '\u6700\u65b0',
        title: '\u8d44\u6599\u9986\u5df2\u5c31\u7eea',
        body: '\u6536\u5f55\u5b98\u65b9\u52a8\u6001\u3001\u89d2\u8272\u8d44\u6599\u3001\u6982\u5ff5\u8bbe\u5b9a\u4e0e\u793e\u533a\u4e8c\u521b\uff0c\u9002\u5408\u65e5\u5e38\u67e5\u9605\u3002'
      },
      {
        tab: '\u7248\u672c',
        title: 'v1.1.1',
        body: '\u672c\u7248\u672c\u4f18\u5316\u5b89\u88c5\u3001\u4fee\u590d\u3001\u91cd\u88c5\u548c\u66f4\u65b0\u6d41\u7a0b\uff0c\u4e3b\u6309\u94ae\u805a\u7126\u542f\u52a8\u4f53\u9a8c\u3002'
      },
      {
        tab: '\u7ef4\u62a4',
        title: '\u6863\u6848\u7ef4\u62a4\u63d0\u793a',
        body: '\u6587\u4ef6\u7f3a\u5931\u6216\u542f\u52a8\u5f02\u5e38\u65f6\uff0c\u53ef\u4ece\u53f3\u4fa7\u9f7f\u8f6e\u83dc\u5355\u8fdb\u884c\u4fee\u590d\u3002'
      }
    ];
    const coverImages = [
      '../manual-build/assets/zy/\u7fa4\u53cb\u7b11\u8bdd\u5408\u96c6.jpg',
      '../manual-build/assets/zy/\u73a9\u5bb6\u4e8c\u521b.jpg',
      '../manual-build/assets/zy/\u8bf8\u795e\u7ec8\u5e94\u77e5\u6653\u6982\u5ff5\u56fe.jpg',
      '../manual-build/assets/zy/\u8bf8\u795e\u7ec8\u5e94\u77e5\u6653\u89d2\u8272\u8bbe\u5b9a.jpg'
    ];
    let coverIndex = 0;

    function renderNotice() {
      noticeBoard.innerHTML = '';
      const visual = document.createElement('div');
      const visualImage = document.createElement('img');
      const dots = document.createElement('div');
      const stack = document.createElement('div');
      visual.className = 'notice-visual';
      visualImage.src = coverImages[coverIndex];
      visualImage.alt = '';
      visualImage.decoding = 'async';
      dots.className = 'cover-dots';
      stack.className = 'notice-stack';
      const dotButtons = coverImages.map((image, index) => {
        const dot = document.createElement('button');
        dot.type = 'button';
        dot.classList.toggle('active', index === coverIndex);
        dot.addEventListener('click', () => {
          setCover(index);
        });
        dots.appendChild(dot);
        return dot;
      });
      const setCover = (index) => {
        coverIndex = index;
        dotButtons.forEach((dot, dotIndex) => {
          dot.classList.toggle('active', dotIndex === coverIndex);
        });
        visualImage.style.opacity = '.35';
        window.setTimeout(() => {
          visualImage.src = coverImages[coverIndex];
          visualImage.style.opacity = '.9';
        }, 220);
      };
      notices.forEach((notice, index) => {
        const item = document.createElement('div');
        const title = document.createElement('strong');
        const body = document.createElement('span');
        item.className = 'notice-item';
        title.textContent = notice.tab + ' · ' + notice.title;
        body.textContent = notice.body;
        item.appendChild(title);
        item.appendChild(body);
        stack.appendChild(item);
      });
      visual.appendChild(visualImage);
      visual.appendChild(dots);
      noticeBoard.appendChild(visual);
      noticeBoard.appendChild(stack);
      window.setInterval(() => {
        setCover((coverIndex + 1) % coverImages.length);
      }, 4500);
    }

    function addQuickLink(label, url) {
      const link = document.createElement('button');
      link.textContent = label;
      link.addEventListener('click', () => {
        window.ZhushenInstaller.openExternal(url);
      });
      quickLinks.appendChild(link);
    }

    function renderQuickLinks() {
      quickLinks.innerHTML = '';
      qqCard.innerHTML = '';
      addQuickLink('TapTap', 'https://www.taptap.cn/app/513986');
      addQuickLink('\u66f4\u65b0\u9875', 'https://github.com/Gao2612/zhushen/releases/latest');
      const qqButton = document.createElement('button');
      const qqTitle = document.createElement('strong');
      const qqPrimary = document.createElement('span');
      const qqSecondary = document.createElement('span');
      qqButton.textContent = 'QQ\u7fa4';
      qqTitle.textContent = 'QQ\u7fa4';
      qqPrimary.textContent = '\u5b98\u65b9\u4e00\u7fa4\uff1a913044248';
      qqSecondary.textContent = '\u5b98\u65b9\u4e8c\u7fa4\uff1a130340208';
      qqButton.addEventListener('click', (event) => {
        event.stopPropagation();
        qqCard.hidden = !qqCard.hidden;
      });
      quickLinks.appendChild(qqButton);
      qqCard.appendChild(qqTitle);
      qqCard.appendChild(qqPrimary);
      qqCard.appendChild(qqSecondary);
    }

    function getProfileFormData() {
      const nickname = profileOverlay.querySelector('#profileNickname').value;
      const avatar = profileOverlay.querySelector('#profileAvatar').value;
      const bio = profileOverlay.querySelector('#profileBio').value;
      return {
        nickname,
        avatar,
        bio,
        preferences: {
          music: profileOverlay.querySelector('#profileMusic').checked,
          reducedMotion: profileOverlay.querySelector('#profileMotion').checked,
          rememberLastPage: profileOverlay.querySelector('#profileRemember').checked
        }
      };
    }

    async function saveProfileFromForm() {
      currentProfile = await window.ZhushenInstaller.profileSave(getProfileFormData());
      renderProfile(currentProfile);
    }

    function renderProfile(profile) {
      currentProfile = profile;
      const updated = profile.updatedAt
        ? new Date(profile.updatedAt).toLocaleString()
        : '--';
      profileOverlay.innerHTML = [
        '<section class="profile-panel">',
          '<aside class="profile-side">',
            '<div class="profile-avatar"></div>',
            '<div>',
              '<h2 class="profile-name"></h2>',
              '<p class="profile-muted">本机档案</p>',
            '</div>',
            '<p class="profile-muted profile-id"></p>',
            '<p class="profile-muted profile-updated"></p>',
          '</aside>',
          '<section class="profile-main">',
            '<div class="profile-head">',
              '<h2>个人档案</h2>',
              '<button class="profile-close" id="profileClose" title="关闭">×</button>',
            '</div>',
            '<div class="profile-grid">',
              '<div class="profile-card">',
                '<h3>身份资料</h3>',
                '<div class="profile-field"><label>昵称</label><input id="profileNickname" maxlength="24"></div>',
                '<div class="profile-field"><label>头像字</label><input id="profileAvatar" maxlength="2"></div>',
                '<div class="profile-field"><label>备注</label><textarea id="profileBio" maxlength="80"></textarea></div>',
              '</div>',
              '<div class="profile-card">',
                '<h3>偏好设置</h3>',
                '<label class="profile-toggle"><input id="profileMusic" type="checkbox"> 保持背景音乐</label>',
                '<label class="profile-toggle"><input id="profileMotion" type="checkbox"> 减少动态效果</label>',
                '<label class="profile-toggle"><input id="profileRemember" type="checkbox"> 记住上次浏览位置</label>',
              '</div>',
              '<div class="profile-card">',
                '<h3>我的空间</h3>',
                '<p class="profile-muted">收藏内容：' + profile.favorites.length + ' 项</p>',
                '<p class="profile-muted">浏览记录：' + profile.history.length + ' 条</p>',
                '<p class="profile-muted">后续会与资料馆收藏、阅读记录打通。</p>',
              '</div>',
              '<div class="profile-card">',
                '<h3>数据备份</h3>',
                '<p class="profile-muted">档案保存在本机，可先通过 JSON 导入 / 导出备份。</p>',
                '<div class="profile-actions">',
                  '<button id="profileSave">保存</button>',
                  '<button id="profileExport">导出档案</button>',
                  '<button id="profileImport">导入档案</button>',
                  '<button class="profile-cloud" disabled>云备份 未启用</button>',
                '</div>',
              '</div>',
            '</div>',
          '</section>',
        '</section>'
      ].join('');
      profileOverlay.querySelector('.profile-avatar').textContent = profile.avatar;
      profileOverlay.querySelector('.profile-name').textContent = profile.nickname;
      profileOverlay.querySelector('.profile-id').textContent = 'ID ' + profile.profileId;
      profileOverlay.querySelector('.profile-updated').textContent = '更新于 ' + updated;
      profileOverlay.querySelector('#profileNickname').value = profile.nickname;
      profileOverlay.querySelector('#profileAvatar').value = profile.avatar;
      profileOverlay.querySelector('#profileBio').value = profile.bio;
      profileOverlay.querySelector('#profileMusic').checked = !!profile.preferences.music;
      profileOverlay.querySelector('#profileMotion').checked = !!profile.preferences.reducedMotion;
      profileOverlay.querySelector('#profileRemember').checked = !!profile.preferences.rememberLastPage;
      profileOverlay.querySelector('#profileClose').addEventListener('click', () => {
        profileOverlay.hidden = true;
      });
      profileOverlay.querySelector('#profileSave').addEventListener('click', saveProfileFromForm);
      profileOverlay.querySelector('#profileExport').addEventListener('click', async () => {
        await saveProfileFromForm();
        await window.ZhushenInstaller.profileExport();
      });
      profileOverlay.querySelector('#profileImport').addEventListener('click', async () => {
        const result = await window.ZhushenInstaller.profileImport();
        renderProfile(result.profile || await window.ZhushenInstaller.profileGet());
      });
    }

    async function openProfile() {
      if (!currentProfile) {
        currentProfile = await window.ZhushenInstaller.profileGet();
      }
      renderProfile(currentProfile);
      profileOverlay.hidden = false;
    }

    let installed = false;
    let busy = false;
    let updateAvailable = false;

    const setStatus = (text) => { statusNode.textContent = text; };
    const setProgress = (percent) => {
      barNode.style.width = Math.max(0, Math.min(100, Number(percent) || 0)) + '%';
    };
    const setManageOpen = (open) => {
      managePanel.hidden = !open;
    };
    const setBusy = (value) => {
      busy = value;
      document.body.classList.toggle('is-busy', value);
      installButton.disabled = value;
      chooseButton.disabled = value || installed;
      manageButton.disabled = value;
      uninstallButton.disabled = value || !installed;
      openButton.disabled = value || !installed;
      logsButton.disabled = value;
      checkUpdateButton.disabled = value;
      updateButton.disabled = value || !installed || !updateAvailable;
      repairButton.disabled = value || !installed;
      reinstallButton.disabled = value || !installed;
      if (value || !installed) {
        setManageOpen(false);
      }
    };
    const syncButtons = () => {
      stateNode.textContent = '';
      installButton.textContent = installed ? '\u542f\u52a8' : '\u7acb\u5373\u5b89\u88c5';
      setBusy(false);
    };

    async function refresh() {
      const status = await window.ZhushenInstaller.getStatus();
      installed = status.installed;
      document.body.classList.toggle('is-installed', installed);
      panelTitle.textContent = installed ? '\u8bf8\u795e\u7ec8\u5e94\u77e5\u6653' : '\u6e38\u620f\u5b89\u88c5';
      closeAfterLaunchInput.checked = status.closeAfterLaunch !== false;
      pathNode.textContent = status.installDir;
      if (status.space) {
        spaceNode.textContent = '\u6240\u9700\u7a7a\u95f4 '
          + status.space.requiredText + ' / \u53ef\u7528 '
          + status.space.freeText;
      }
      if (status.healthProblems > 0) {
        updateNode.textContent = '\u68c0\u6d4b\u5230 '
          + status.healthProblems + ' \u4e2a\u6587\u4ef6\u9700\u8981\u4fee\u590d\u3002';
        updateNode.classList.add('ready');
      } else if (!updateAvailable) {
        updateNode.textContent = status.buildId
          ? '\u672c\u5730\u6784\u5efa\uff1a' + status.buildId
          : '\u5c1a\u672a\u5b89\u88c5\u3002';
        updateNode.classList.remove('ready');
      }
      setProgress(installed ? 100 : 0);
      setStatus(installed
        ? ''
        : status.payloadExists
          ? '\u51c6\u5907\u5c31\u7eea\uff0c\u70b9\u51fb\u7acb\u5373\u5b89\u88c5\u3002'
          : '\u672a\u627e\u5230\u5185\u7f6e\u5ba2\u6237\u7aef\u8d44\u6e90\uff0c\u8bf7\u91cd\u65b0\u6784\u5efa\u5b89\u88c5\u5668\u3002');
      syncButtons();
    }

    window.ZhushenInstaller.onProgress((payload) => {
      setProgress(payload.percent);
      setStatus(payload.message);
    });

    chooseButton.addEventListener('click', async () => {
      const installDir = await window.ZhushenInstaller.chooseInstallDir();
      pathNode.textContent = installDir;
      setStatus('\u5b89\u88c5\u4f4d\u7f6e\u5df2\u66f4\u65b0\u3002');
      await refresh();
    });

    installButton.addEventListener('click', async () => {
      if (installed) {
        const result = await window.ZhushenInstaller.launch();
        const ok = result === true || !!(result && result.ok);
        setStatus(ok
          ? '\u5ba2\u6237\u7aef\u5df2\u542f\u52a8\u3002'
          : result && result.message
            ? result.message
            : '\u5ba2\u6237\u7aef\u542f\u52a8\u5931\u8d25\u3002');
        return;
      }
      setBusy(true);
      setProgress(0);
      setStatus('\u6b63\u5728\u5f00\u59cb\u5b89\u88c5...');
      const ok = await window.ZhushenInstaller.install();
      installed = ok;
      await refresh();
    });

    manageButton.addEventListener('click', () => {
      if (busy) {
        return;
      }
      setManageOpen(managePanel.hidden);
    });

    closeAfterLaunchInput.addEventListener('change', async () => {
      closeAfterLaunchInput.checked = await window.ZhushenInstaller.setCloseAfterLaunch(
        closeAfterLaunchInput.checked
      );
    });

    document.addEventListener('click', (event) => {
      if (!event.target.closest('.settings-menu')) {
        setManageOpen(false);
      }
      if (!event.target.closest('.quick-links') && !event.target.closest('.qq-card')) {
        qqCard.hidden = true;
      }
    });

    uninstallButton.addEventListener('click', async () => {
      setManageOpen(false);
      setBusy(true);
      setStatus('\u6b63\u5728\u5378\u8f7d...');
      const ok = await window.ZhushenInstaller.uninstall();
      installed = !ok;
      await refresh();
    });

    openButton.addEventListener('click', async () => {
      setManageOpen(false);
      const opened = await window.ZhushenInstaller.openInstallDir();
      setStatus(opened ? '\u5df2\u6253\u5f00\u5b89\u88c5\u76ee\u5f55\u3002' : '\u5c1a\u672a\u627e\u5230\u5b89\u88c5\u76ee\u5f55\u3002');
    });

    logsButton.addEventListener('click', async () => {
      setManageOpen(false);
      const result = await window.ZhushenInstaller.openLogs();
      setStatus(result && result.ok
        ? '\u5df2\u6253\u5f00\u65e5\u5fd7\u76ee\u5f55\u3002'
        : '\u65e5\u5fd7\u76ee\u5f55\u6253\u5f00\u5931\u8d25\u3002');
    });

    checkUpdateButton.addEventListener('click', async () => {
      setManageOpen(false);
      setStatus('\u6b63\u5728\u68c0\u67e5\u66f4\u65b0...');
      const result = await window.ZhushenInstaller.checkUpdate();
      updateAvailable = !!(result && result.available);
      updateButton.hidden = !updateAvailable;
      if (result && result.error) {
        updateNode.textContent = '\u66f4\u65b0\u68c0\u67e5\u5931\u8d25\uff1a' + result.error;
      } else if (updateAvailable) {
        updateNode.textContent = '\u53d1\u73b0\u65b0\u6784\u5efa\uff1a' + result.remote.buildId;
        updateNode.classList.add('ready');
      } else {
        updateNode.textContent = '\u5df2\u662f\u6700\u65b0\u7248\u672c\u3002';
        updateNode.classList.remove('ready');
      }
      setBusy(false);
    });

    updateButton.addEventListener('click', async () => {
      setManageOpen(false);
      setBusy(true);
      setStatus('\u6b63\u5728\u66f4\u65b0...');
      const result = await window.ZhushenInstaller.update();
      updateAvailable = false;
      updateButton.hidden = true;
      setStatus(result ? '\u66f4\u65b0\u5b8c\u6210\u3002' : '\u66f4\u65b0\u672a\u5b8c\u6210\u3002');
      await refresh();
    });

    repairButton.addEventListener('click', async () => {
      setManageOpen(false);
      setBusy(true);
      setStatus('\u6b63\u5728\u4fee\u590d...');
      const result = await window.ZhushenInstaller.repair();
      setStatus(result ? '\u4fee\u590d\u5b8c\u6210\u3002' : '\u4fee\u590d\u672a\u5b8c\u6210\u3002');
      await refresh();
    });

    reinstallButton.addEventListener('click', async () => {
      setManageOpen(false);
      setBusy(true);
      setProgress(0);
      setStatus('\u6b63\u5728\u91cd\u65b0\u5b89\u88c5...');
      const ok = await window.ZhushenInstaller.reinstall();
      installed = !!ok;
      await refresh();
    });

    renderNotice();
    renderQuickLinks();
    refresh();
  </script>
</body>
</html>
