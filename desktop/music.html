<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Background Music</title>
</head>
<body>
  <audio id="music" src="../manual-build/assets/audio/background_music.oga" loop preload="auto"></audio>
  <script>
    const music = document.getElementById('music');
    let lastState = { enabled: null, volume: null, positionApplied: false };
    let fadeTimer = null;
    music.muted = false;
    const fadeTo = (targetVolume, duration) => new Promise((resolve) => {
      window.clearInterval(fadeTimer);
      const startedAt = Date.now();
      const startVolume = music.volume;
      const distance = targetVolume - startVolume;
      if (duration <= 0 || Math.abs(distance) < 0.01) {
        music.volume = targetVolume;
        resolve();
        return;
      }
      fadeTimer = window.setInterval(() => {
        const ratio = Math.min(1, (Date.now() - startedAt) / duration);
        music.volume = Math.max(0, Math.min(1, startVolume + distance * ratio));
        if (ratio >= 1) {
          window.clearInterval(fadeTimer);
          fadeTimer = null;
          resolve();
        }
      }, 32);
    });
    const readState = () => ({
      enabled: lastState.enabled === true,
      playing: !music.paused,
      paused: music.paused,
      position: Number.isFinite(music.currentTime) ? music.currentTime : 0,
      duration: Number.isFinite(music.duration) ? music.duration : 0,
      volume: Math.round(music.volume * 100)
    });
    window.readMusicState = () => Promise.resolve(readState());
    window.applyMusicState = (state) => {
      const volume = Math.max(0, Math.min(1, Number(state.volume || 0) / 100));
      const normalizedVolume = Math.round(volume * 100);
      const stateUnchanged = lastState.enabled === !!state.enabled
        && lastState.volume === normalizedVolume;
      music.muted = false;
      if (!lastState.positionApplied && Number(state.position) > 0) {
        music.currentTime = Math.max(0, Number(state.position) || 0);
        lastState.positionApplied = true;
      }
      lastState = {
        enabled: !!state.enabled,
        volume: normalizedVolume,
        positionApplied: lastState.positionApplied
      };
      if (!state.enabled) {
        if (!music.paused) {
          return fadeTo(0, 420).then(() => {
            music.pause();
            music.volume = volume;
            return readState();
          });
        }
        music.volume = volume;
        return Promise.resolve(readState());
      }
      if (stateUnchanged && !music.paused) {
        return Promise.resolve(readState());
      }
      music.volume = 0;
      return music.play().then(() => fadeTo(volume, 520)).then(() => readState()).catch((error) => {
        const result = readState();
        result.error = error && error.message ? error.message : String(error);
        return result;
      });
    };
  </script>
</body>
</html>
